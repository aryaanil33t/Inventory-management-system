{% extends 'base.html' %}

{% block main %}

<div class="container-fluid vh-100 d-flex align-items-center justify-content-center" style="background-color: black">

  <div class="card shadow-lg p-4" style="width: 400px; border-radius: 12px;">
    
    <!-- Title -->
    <div class="text-center mb-4">
      <h3 style="font-weight: 600;">Add Name</h3>
      <p class="text-muted" style="font-size: 14px;">Enter your name to continue</p>
    </div>

    <!-- Form -->
    <form action="" method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <!-- Name Field -->
      <div class="mb-3">
        <label class="form-label">Name</label>
        {{ form.name }}
        {% if form.name.errors %}
          <p class="text-danger small mt-1">{{ form.name.errors.0 }}</p>
        {% endif %}
      </div>

      <!-- Submit Button -->
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary" style="border-radius: 8px;">
          Register
        </button>
      </div>

      <!-- Error -->
      {% if error %}
      <div class="text-center mb-2">
        <p class="text-danger small">{{ error }}</p>
      </div>
      {% endif %}

    </form>

  </div>

</div>

{% endblock %}
