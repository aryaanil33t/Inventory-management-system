{% extends 'base.html' %}

{% block main %}

<div class="container-fluid vh-100 d-flex align-items-center justify-content-center" style="background-color: black">

  <div class="card shadow-lg p-4" style="width: 400px; border-radius: 12px;">

    <!-- Title -->
    <div class="text-center mb-3">
      <h4 style="font-weight: 600;">OTP Verification</h4>
      <p class="text-muted small">Enter the OTP sent to {{ phone }}</p>
    </div>

    <!-- Form -->
    <form method="post">
      {% csrf_token %}

      <!-- OTP Field -->
      <div class="mb-3">
        <label class="form-label">Enter OTP</label>
        {{ form.otp }}
        {% if form.otp.errors %}
          <p class="text-danger small mt-1">{{ form.otp.errors.0 }}</p>
        {% endif %}
      </div>

      <!-- Submit Button -->
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-success" style="border-radius: 8px;">
          Verify & Login
        </button>
      </div>

      <!-- Error -->
      {% if error %}
      <div class="text-center mb-2">
        <p class="text-danger small">{{ error }}</p>
      </div>
      {% endif %}

      <!-- Timer / Resend -->
      <div class="text-center">
        <p id="timer" class="small text-muted"></p>
      </div>

    </form>

  </div>

</div>

<!-- Timer Script -->
<script>
  let timeLeft = parseInt('{{ remaining_time|default:0 }}');
  let timerElement = document.getElementById('timer');

  function updateTimer() {
      if (timeLeft <= 0) {
          timerElement.innerHTML = `
              <a class="btn btn-outline-primary btn-sm mt-2" href="{% url 'phone-otp' %}">
                  Resend OTP
              </a>
          `;
      } else {
          let minutes = Math.floor(timeLeft / 60);
          let seconds = timeLeft % 60;
          timerElement.innerText = `Resend OTP in ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
          timeLeft--;
          setTimeout(updateTimer, 1000);
      }
  }

  updateTimer();
</script>

{% endblock %}
