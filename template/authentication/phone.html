{% extends 'base.html' %}

{% block main %}

<div class="container-fluid vh-100 d-flex align-items-center justify-content-center" style="background-color: black">

  <div class="card shadow-lg p-4" style="width: 400px; border-radius: 12px;">
    
    <!-- Title -->
    <div class="text-center mb-4">
      <h3 style="font-weight: 600;">Inventory Login</h3>
      <p class="text-muted" style="font-size: 14px;">Sign in to manage your inventory</p>
    </div>

    <!-- Form -->
    <form method="post">
      {% csrf_token %}

      <!-- Phone Field -->
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        {{ form.phone }}
        {% if form.phone.errors %}
          <p class="text-danger small mt-1">{{ form.phone.errors.0 }}</p>
        {% endif %}
      </div>

      <!-- Submit Button -->
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary" style="border-radius: 8px;">
          Login
        </button>
      </div>

      <!-- Error Message -->
      {% if error %}
      <div class="text-center mb-2">
        <p class="text-danger small">{{ error }}</p>
      </div>
      {% endif %}

      <!-- Signup Link -->
      <div class="text-center">
        <p class="small">
          Don’t have an account?
          <a href="{% url 'signup' %}" class="text-decoration-none">Sign up</a>
        </p>
      </div>

    </form>

  </div>

</div>

{% endblock %}
