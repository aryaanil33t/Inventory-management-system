{% extends "base.html" %}

{% block main %}

<div class="container mt-5">

    <div class="card shadow-sm p-4">
        <h3 class="mb-4">Add Supplier</h3>

        <form method="POST">
            {% csrf_token %}

            <div class="row">

                <!-- Name -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Name *</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <!-- Company -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Company Name</label>
                    <input type="text" name="company_name" class="form-control">
                </div>

                <!-- Email -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control">
                </div>

                <!-- Phone -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Phone *</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>

                <!-- Alternate Phone -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Alternate Phone</label>
                    <input type="text" name="alternate_phone" class="form-control">
                </div>

                <!-- Contact Person -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Contact Person</label>
                    <input type="text" name="contact_person" class="form-control">
                </div>

                <!-- Address -->
                <div class="col-md-12 mb-3">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" rows="2"></textarea>
                </div>

                <!-- City -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">City</label>
                    <input type="text" name="city" class="form-control">
                </div>

                <!-- State -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">State</label>
                    <input type="text" name="state" class="form-control">
                </div>

                <!-- Pincode -->
                <div class="col-md-4 mb-3">
                    <label class="form-label">Pincode</label>
                    <input type="text" name="pincode" class="form-control">
                </div>

                <!-- GST -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">GST Number</label>
                    <input type="text" name="gst_number" class="form-control">
                </div>

                <!-- Payment Terms -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Payment Terms</label>
                    <input type="text" name="payment_terms" class="form-control" placeholder="e.g. Net 30 days">
                </div>

                <!-- Credit Limit -->
                <div class="col-md-6 mb-3">
                    <label class="form-label">Credit Limit</label>
                    <input type="number" name="credit_limit" class="form-control">
                </div>

                <!-- Status -->
                <div class="col-md-6 mb-3 d-flex align-items-center">
                    <div class="form-check mt-4">
                        <input class="form-check-input" type="checkbox" name="is_active" checked>
                        <label class="form-check-label">
                            Active Supplier
                        </label>
                    </div>
                </div>

                <!-- Notes -->
                <div class="col-md-12 mb-3">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control" rows="2"></textarea>
                </div>

            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-end">
                <a href="{% url 'suppliers-list' %}" class="btn btn-secondary me-2">
                    Cancel
                </a>
                <button type="submit" class="btn btn-success">
                    Save Supplier
                </button>
            </div>

        </form>
    </div>

</div>

{% endblock %}
