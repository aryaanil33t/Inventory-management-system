{% extends "base.html" %}

{% block main %}
<div class="container mt-5 mb-5">
    <div class="card shadow-sm border-0 p-4">
        <h4 class="mb-4">Edit Warehouse: {{ warehouse.name }}</h4>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- Warehouse Name -->
            <div class="mb-3">
                <label class="form-label">Warehouse Name</label>
                <input type="text" name="name" class="form-control" value="{{ warehouse.name }}" required>
            </div>

            <!-- Location -->
            <div class="mb-3">
                <label class="form-label">Location</label>
                <select name="location" class="form-select" required>
                    {% for loc in locations %}
                        <option value="{{ loc.id }}" {% if loc == warehouse.location %}selected{% endif %}>
                            {{ loc.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn btn-success">Update</button>
            <a href="{% url 'warehouse-list' warehouse.location.uuid %}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
