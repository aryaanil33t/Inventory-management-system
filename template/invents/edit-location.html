{% extends "base.html" %}

{% block main %}

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg p-4">

                <h3 class="text-center mb-4">Edit Location</h3>

                {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Location Name</label>
                        <input type="text"
                               name="name"
                               value="{{ location.name }}"
                               class="form-control"
                               required>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'locations' %}" class="btn btn-secondary">
                            Back
                        </a>

                        <button class="btn btn-success">
                            Update
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>

</div>

{% endblock %}
