{% extends "base.html" %}

{% block main %}
<div class="container mt-5 mb-5">
    <div class="card shadow-sm border-0 p-4">
        <h4 class="mb-4">
            {% if rack %}Edit Rack{% else %}Add Rack{% endif %}
        </h4>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Rack Name</label>
                {{ form.name }}
            </div>
            <div class="form-check mb-3">
                {{ form.active_status }}
                <label class="form-check-label">Active</label>
            </div>
            <button type="submit" class="btn btn-success">
                {% if rack %}Update{% else %}Add{% endif %}
            </button>
            <a href="{% if rack %}{% url 'racks' rack.warehouse.uuid %}{% else %}{% url 'racks' warehouse.uuid %}{% endif %}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
