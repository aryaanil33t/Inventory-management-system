{% extends 'base.html' %}
{% block main %}

<section class="section">
  <div class="container">

    <div class="section-title">
      <h2>Stock Transaction</h2>
    </div>

    <form method="post">
      {% csrf_token %}

      <div class="row gy-3">

        <div class="col-md-6">
          {{ form.product.label_tag }}
          {{ form.product }}
        </div>

        <div class="col-md-6">
          {{ form.transaction_type.label_tag }}
          {{ form.transaction_type }}
        </div>

        <div class="col-md-6">
          {{ form.quantity.label_tag }}
          {{ form.quantity }}
        </div>

        <div class="col-md-12 text-center">
          <button class="btn btn-success">Submit</button>
        </div>

      </div>
    </form>

  </div>
</section>

{% endblock %}
